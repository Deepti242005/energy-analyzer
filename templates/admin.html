<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body {
    margin:0;
    font-family:Arial;
    background:url("https://img.freepik.com/premium-psd/3d-electric-bill-scene-with-solar-energy-house_643173-21.jpg?semt=ais_hybrid") no-repeat center center fixed;
    background-size:cover;
}
.overlay {
    position:fixed;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
}
.container {
    position:relative;
    z-index:2;
    max-width:900px;
    margin:auto;
    padding:20px;
    color:white;
}
.card {
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:10px;
}
table { width:100%; border-collapse:collapse;}
th,td { padding:10px; border:1px solid #ddd;}
th { background:#007bff;}
.nav { text-align:center; margin-top:20px;}
a { color:white;}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="card">
<h1>Admin Panel</h1>

<table>
<tr><th>User</th><th>Appliance</th><th>Units</th><th>Date</th></tr>
{% for d in data %}
<tr>
<td>{{ d[0] }}</td>
<td>{{ d[1] }}</td>
<td>{{ d[2] }}</td>
<td>{{ d[3] }}</td>
</tr>
{% endfor %}
</table>

</div>

<div class="nav">
<a href="/">⬅ Home</a>
<a href="/logout">Logout</a>
</div>

</div>

</body>
</html>
