<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<style>
body {
    margin:0;
    font-family:Arial;
    background:url("https://img.freepik.com/premium-psd/3d-electric-bill-scene-with-solar-energy-house_643173-21.jpg?semt=ais_hybrid") no-repeat center center fixed;
    background-size:cover;
}
.overlay {
    position:fixed;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
}
.container {
    position:relative;
    z-index:2;
    max-width:500px;
    margin:80px auto;
}
.card {
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:10px;
    color:white;
}
input {
    width:100%;
    padding:10px;
    margin:10px 0;
}
button {
    padding:10px;
    background:linear-gradient(45deg,#007bff,#00c6ff);
    border:none;
    color:white;
}
.nav { text-align:center; margin-top:20px;}
a { color:white; margin:0 10px;}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
<div class="card">
<h2>⚡ Add Energy Usage</h2>

<form action="/add" method="post">
<input name="appliance" placeholder="Appliance">
<input name="power" placeholder="Power (W)">
<input name="hours" placeholder="Hours">
<button>Add Data</button>
</form>
</div>

<div class="nav">
<a href="/dashboard">📊 Dashboard</a>
<a href="/logout">Logout</a>
</div>
</div>

</body>
</html>
